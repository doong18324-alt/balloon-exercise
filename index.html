<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>AI 맞춤형 운동 트레이너</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;600;700;900&display=swap');
:root{--pri:#FF3366;--sec:#7C3AED;--acc:#06D6A0;--dk:#0B0E1A;--card:rgba(255,255,255,0.04);--bdr:rgba(255,255,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dk);color:#fff;overflow-x:hidden;min-height:100vh;min-height:100dvh}
.screen{display:none;min-height:100vh;min-height:100dvh}.screen.active{display:flex;flex-direction:column}
.container{width:min(95vw,500px);margin:0 auto;padding:0 16px}
.bg-grad{background:linear-gradient(160deg,#0B0E1A 0%,#1a1040 50%,#0B0E1A 100%)}
.section-title{font-family:'Black Han Sans';font-size:clamp(18px,4.5vw,24px);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:16px;margin-bottom:12px}
.label{font-size:13px;color:#94a3b8;margin-bottom:6px;font-weight:600}
input[type=number]{width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid var(--bdr);border-radius:12px;color:#fff;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none}
input:focus{border-color:var(--pri)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border:none;border-radius:50px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.3s;color:#fff;width:100%}
.btn-primary{background:linear-gradient(135deg,var(--pri),var(--sec))}.btn-primary:hover{transform:scale(1.02)}
.btn-secondary{background:rgba(255,255,255,0.08);border:1px solid var(--bdr)}
.row{display:flex;gap:10px}.row>*{flex:1}
.tag-grid{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--bdr);background:transparent;color:#94a3b8;cursor:pointer;transition:all 0.3s;font-family:inherit}
.tag.sel{border-color:var(--pri);background:rgba(255,51,102,0.12);color:#fff}
.tag.nrm.sel{border-color:var(--acc);background:rgba(6,214,160,0.12);color:var(--acc)}
.scroll-body{flex:1;overflow-y:auto;padding:20px 0 40px;-webkit-overflow-scrolling:touch}
.hbar{padding:max(env(safe-area-inset-top),12px) 16px 12px;background:rgba(11,14,26,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:20}
.hbar h2{font-size:18px;font-weight:800;text-align:center}.hbar .bk{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;font-size:24px;cursor:pointer}
.steps{display:flex;gap:4px;justify-content:center;margin-top:8px}.sd{width:24px;height:3px;border-radius:2px;background:rgba(255,255,255,0.1)}.sd.on{background:var(--pri)}.sd.ok{background:var(--acc)}
#homeScreen{align-items:center;justify-content:center;padding:20px}
.htitle{font-family:'Black Han Sans';font-size:clamp(28px,7vw,48px);background:linear-gradient(135deg,#FF3366,#FF6B9D,#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;line-height:1.2}
.hsub{font-size:14px;color:#94a3b8;text-align:center;margin:12px 0 24px;line-height:1.6}
.feats{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(92vw,380px);margin-bottom:24px}
.feat{padding:12px;border-radius:14px;background:var(--card);border:1px solid var(--bdr);text-align:center;font-size:11px;color:#94a3b8}
.feat span{display:block;font-size:22px;margin-bottom:4px}
.risk-badge{display:inline-flex;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
.rl{background:rgba(6,214,160,0.15);color:#06D6A0;border:1px solid rgba(6,214,160,0.3)}
.rm{background:rgba(245,158,11,0.15);color:#F59E0B;border:1px solid rgba(245,158,11,0.3)}
.rh{background:rgba(255,51,102,0.15);color:#FF3366;border:1px solid rgba(255,51,102,0.3)}
.brec{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;background:var(--card);border:1px solid var(--bdr)}
.bcirc{width:48px;height:48px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,0.15)}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.dbtn{padding:14px 8px;border-radius:14px;background:var(--card);border:2px solid var(--bdr);color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;transition:all 0.3s}
.dbtn.sel{border-color:var(--pri);background:rgba(255,51,102,0.1)}
.dbtn small{display:block;font-size:11px;color:#94a3b8;font-weight:400;margin-top:2px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.tbtn{padding:16px;border-radius:14px;background:var(--card);border:2px solid var(--bdr);color:#fff;cursor:pointer;font-family:inherit;transition:all 0.3s;text-align:center}
.tbtn.sel{border-color:var(--sec);background:rgba(124,58,237,0.1)}
.tbtn .ti{font-size:28px}.tbtn .tn{font-size:14px;font-weight:700;margin-top:4px}.tbtn .td{font-size:11px;color:#94a3b8;margin-top:2px}
.ep{display:flex;gap:12px;align-items:center;padding:14px;border-radius:14px;background:var(--card);border:1px solid var(--bdr);margin-bottom:8px;cursor:pointer}
.ep .ei{font-size:28px;flex-shrink:0}
.istep{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.03)}
.istep-n{width:20px;height:20px;border-radius:50%;background:var(--pri);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.icaut{padding:8px;border-radius:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);font-size:12px;color:#F59E0B;margin-top:8px}
/* Camera */
#camScreen{padding:0;overflow:hidden;position:relative;height:100vh;height:100dvh}
#vbox{position:relative;width:100%;height:100%;background:#000}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#pc{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);z-index:2}
#fc{position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none}
.cht{position:absolute;top:0;left:0;right:0;z-index:10;padding:max(env(safe-area-inset-top),10px) 14px 10px;display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(180deg,rgba(0,0,0,0.8) 0%,transparent 100%)}
.cinfo{max-width:62%}.cname{font-family:'Black Han Sans';font-size:clamp(16px,4vw,24px);background:linear-gradient(135deg,#FF3366,#FF6B9D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.cdesc{font-size:11px;color:#94a3b8}.cprog{font-size:10px;color:#64748b;margin-top:2px}.ctimer{font-size:11px;color:var(--acc);font-weight:600;margin-top:3px}
.crep{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:16px;padding:8px 16px;border:1px solid rgba(255,255,255,0.06)}
.crep-n{font-family:'Black Han Sans';font-size:40px;line-height:1;color:#fff;transition:transform 0.25s,color 0.25s}.crep-l{font-size:10px;color:#94a3b8}
/* State indicator */
.cstate{position:absolute;top:50%;left:10px;z-index:10;transform:translateY(-50%);background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,0.05);text-align:center;min-width:70px}
.cstate .cs-icon{font-size:28px}.cstate .cs-txt{font-size:10px;color:#94a3b8;margin-top:4px}
.cstate.ready .cs-icon{animation:pulse2 1s ease-in-out infinite}
@keyframes pulse2{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.chb{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:10px 14px max(env(safe-area-inset-bottom),14px);background:linear-gradient(0deg,rgba(0,0,0,0.8) 0%,transparent 100%)}
.cdots{display:flex;justify-content:center;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.cdot{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.12);font-size:8px;color:transparent;display:flex;align-items:center;justify-content:center;transition:all 0.3s}
.cdot.dn{background:var(--pri);border-color:var(--pri);color:#fff;transform:scale(1.1)}.cdot.cu{border-color:var(--acc);box-shadow:0 0 8px rgba(6,214,160,0.4)}
.cpbar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}.cpfill{height:100%;border-radius:2px;transition:width 0.5s;background:linear-gradient(90deg,var(--pri),var(--sec))}
.cbk{position:absolute;bottom:max(env(safe-area-inset-bottom),14px);right:14px;z-index:10;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:7px 14px;border-radius:10px;font-family:inherit;font-size:12px;cursor:pointer}
.fbt{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:20;pointer-events:none;font-family:'Black Han Sans';font-size:clamp(36px,10vw,72px);color:#fff;text-shadow:0 4px 30px rgba(255,51,102,0.9),0 0 60px rgba(124,58,237,0.5);opacity:0}
.fbt.show{animation:tpop 1s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes tpop{0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0}25%{transform:translate(-50%,-50%) scale(1.4) rotate(5deg);opacity:1}50%{transform:translate(-50%,-50%) scale(1) rotate(0deg);opacity:1}100%{transform:translate(-50%,-60%) scale(0.7) rotate(-5deg);opacity:0}}
/* Trans */
#trScr{position:fixed;inset:0;z-index:50;background:rgba(11,14,26,0.95);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
#trScr.on{display:flex}
.trs{font-size:12px;color:#64748b}.tri{font-size:56px}.trn{font-family:'Black Han Sans';font-size:clamp(24px,6vw,44px);text-align:center;background:linear-gradient(135deg,var(--acc),var(--sec));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.trd{font-size:14px;color:#94a3b8;text-align:center;max-width:85%}.trr{font-size:13px;color:var(--pri);font-weight:700}.trc{font-family:'Black Han Sans';font-size:72px;color:#fff;margin-top:8px}
/* Complete */
#compScreen{align-items:center;justify-content:center;padding:20px;text-align:center}
.ce{font-size:64px;animation:bce 1s ease infinite}@keyframes bce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px) rotate(6deg)}}
.ct{font-family:'Black Han Sans';font-size:clamp(26px,6vw,48px);background:linear-gradient(135deg,#FFD700,#FF6B9D,#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.csu{font-size:14px;color:#94a3b8;margin:8px 0 20px}
.csts{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.sc{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px 18px;text-align:center;min-width:90px}
.sn{font-family:'Black Han Sans';font-size:28px;color:var(--acc)}.sl{font-size:11px;color:#94a3b8;margin-top:2px}
.cbtns{display:flex;flex-direction:column;gap:10px;width:min(90vw,360px)}
.footer{text-align:center;font-size:10px;color:#334155;padding:16px 0}
</style>
</head>
<body>
<div id="homeScreen" class="screen active bg-grad">
<div class="htitle">AI 맞춤형<br>운동 트레이너</div>
<div class="hsub">ACSM 평가 → 맞춤 프로그램 → 풍선 터트리기 → PDF 리포트</div>
<div class="feats"><div class="feat"><span>📋</span>ACSM 평가</div><div class="feat"><span>🎈</span>풍선 운동</div><div class="feat"><span>🥗</span>식이 제안</div><div class="feat"><span>📄</span>PDF 리포트</div></div>
<button class="btn btn-primary" style="width:min(92vw,380px)" onclick="go('profScreen')">시작하기 →</button>
<div class="footer">AI Sports Tech Research Center · Gwangju Health University</div>
</div>

<div id="profScreen" class="screen bg-grad">
<div class="hbar"><button class="bk" onclick="go('homeScreen')">←</button><h2>기본 정보 입력</h2><div class="steps"><div class="sd on"></div><div class="sd"></div><div class="sd"></div><div class="sd"></div></div></div>
<div class="scroll-body"><div class="container">
<div class="card"><div class="section-title">👤 인적 사항</div>
<div class="label">연령</div><input type="number" id="iAge" placeholder="65" min="10" max="120">
<div style="height:10px"></div>
<div class="row"><div><div class="label">키 (cm)</div><input type="number" id="iHt" placeholder="165"></div><div><div class="label">체중 (kg)</div><input type="number" id="iWt" placeholder="70"></div></div>
<div style="height:10px"></div>
<div class="label">성별</div>
<div class="row"><button class="tag sel" data-s="m" onclick="pickSex(this)">남성</button><button class="tag" data-s="f" onclick="pickSex(this)">여성</button></div></div>
<div class="card"><div class="section-title">🏥 기저질환</div>
<div class="label" style="margin-bottom:10px">해당 항목 선택 (없으면 '정상')</div>
<div class="tag-grid" id="cTags">
<button class="tag nrm" data-c="normal" onclick="pickC(this)">✅ 정상</button>
<button class="tag" data-c="hypertension" onclick="pickC(this)">고혈압</button>
<button class="tag" data-c="diabetes" onclick="pickC(this)">당뇨병</button>
<button class="tag" data-c="heart" onclick="pickC(this)">심장질환</button>
<button class="tag" data-c="arthritis" onclick="pickC(this)">관절염</button>
<button class="tag" data-c="osteoporosis" onclick="pickC(this)">골다공증</button>
<button class="tag" data-c="backpain" onclick="pickC(this)">허리통증</button>
<button class="tag" data-c="kneepain" onclick="pickC(this)">무릎통증</button>
<button class="tag" data-c="shoulderpain" onclick="pickC(this)">어깨통증</button>
<button class="tag" data-c="respiratory" onclick="pickC(this)">호흡기질환</button>
<button class="tag" data-c="obesity" onclick="pickC(this)">비만</button>
<button class="tag" data-c="sarcopenia" onclick="pickC(this)">근감소증</button>
</div></div>
<button class="btn btn-primary" onclick="submitProf()">다음: ACSM 평가 →</button>
<div style="height:24px"></div></div></div></div>

<div id="assessScreen" class="screen bg-grad"><div class="hbar"><button class="bk" onclick="go('profScreen')">←</button><h2>ACSM 평가 결과</h2><div class="steps"><div class="sd ok"></div><div class="sd on"></div><div class="sd"></div><div class="sd"></div></div></div><div class="scroll-body"><div class="container" id="asCont"></div></div></div>
<div id="progScreen" class="screen bg-grad"><div class="hbar"><button class="bk" onclick="go('assessScreen')">←</button><h2>프로그램 설정</h2><div class="steps"><div class="sd ok"></div><div class="sd ok"></div><div class="sd on"></div><div class="sd"></div></div></div><div class="scroll-body"><div class="container" id="pgCont"></div></div></div>
<div id="instrScreen" class="screen bg-grad"><div class="hbar"><button class="bk" onclick="go('progScreen')">←</button><h2>운동 미리보기</h2><div class="steps"><div class="sd ok"></div><div class="sd ok"></div><div class="sd ok"></div><div class="sd on"></div></div></div><div class="scroll-body"><div class="container" id="inCont"></div></div></div>

<div id="camScreen" class="screen"><div id="vbox"><video id="vid" autoplay playsinline muted></video><canvas id="pc"></canvas><canvas id="fc"></canvas>
<div class="cht"><div class="cinfo"><div class="cname" id="cn"></div><div class="cdesc" id="cd"></div><div class="cprog" id="cp"></div><div class="ctimer" id="ctm"></div></div><div class="crep"><div class="crep-n" id="crn">0</div><div class="crep-l">/ <span id="crm">10</span></div></div></div>
<div class="cstate" id="cst"><div class="cs-icon" id="csi">🎈</div><div class="cs-txt" id="cstxt">준비</div></div>
<div class="chb"><div class="cdots" id="cdots"></div><div class="cpbar"><div class="cpfill" id="cpf" style="width:0%"></div></div></div>
<button class="cbk" onclick="exitEx()">← 종료</button><div class="fbt" id="fbt"></div></div></div>

<div id="trScr"><div class="trs" id="trs"></div><div class="tri" id="tri"></div><div class="trn" id="trn"></div><div class="trd" id="trd"></div><div class="trr" id="trr"></div><div class="trc" id="trc">5</div></div>

<div id="compScreen" class="screen bg-grad"><div class="ce">🎉</div><div class="ct">운동 완료!</div><div class="csu" id="csub"></div><div class="csts" id="cstats"></div>
<div class="cbtns"><button class="btn btn-primary" onclick="makePDF()">📄 PDF 리포트 다운로드</button><button class="btn btn-secondary" onclick="location.reload()">🏠 처음으로</button></div></div>

<script type="module">
import{PoseLandmarker,FilesetResolver,DrawingUtils}from"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18";

/* ═══ STATE ═══ */
const P={age:0,ht:0,wt:0,sex:'m',bmi:0,conds:[],risk:'low',hrMax:0,hrZ:[0,0],bandName:'',bandHex:'',bandR:'',bandD:'',dur:10,useBand:true,prog:[],exList:[],exI:0,rep:0,phase:'down',on:false,pops:0,t0:null,bmr:0,tdee:0,cal:0,exRec:[],dietRec:[]};
let pose=null,anim=null,lvt=-1,balloons=[],particles=[],actx=null,tmr=null;

/* ═══ AUDIO ═══ */
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sndPop(){try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(900,c.currentTime);o.frequency.exponentialRampToValueAtTime(150,c.currentTime+0.15);g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.15);o.start();o.stop(c.currentTime+0.15);const bs=c.sampleRate*0.07,buf=c.createBuffer(1,bs,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<bs;i++)d[i]=(Math.random()*2-1)*(1-i/bs);const n=c.createBufferSource();n.buffer=buf;const ng=c.createGain();ng.gain.setValueAtTime(0.2,c.currentTime);ng.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.07);n.connect(ng);ng.connect(c.destination);n.start();if(navigator.vibrate)navigator.vibrate(60)}catch(e){}}
function sndWin(){try{const c=ac();[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.15,c.currentTime+i*0.12);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+i*0.12+0.3);o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*0.12);o.stop(c.currentTime+i*0.12+0.3)});if(navigator.vibrate)navigator.vibrate([100,50,100,50,200])}catch(e){}}
function sndTick(){try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.frequency.value=880;g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+0.06);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.06);if(navigator.vibrate)navigator.vibrate(25)}catch(e){}}

/* ═══ NAV ═══ */
window.go=function(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)};
window.pickSex=function(el){document.querySelectorAll('[data-s]').forEach(t=>t.classList.remove('sel'));el.classList.add('sel');P.sex=el.dataset.s};
window.pickC=function(el){const c=el.dataset.c;if(c==='normal'){document.querySelectorAll('#cTags .tag').forEach(t=>t.classList.remove('sel'));el.classList.add('sel');P.conds=['normal'];return}document.querySelector('[data-c="normal"]').classList.remove('sel');el.classList.toggle('sel');P.conds=[...document.querySelectorAll('#cTags .tag.sel')].map(t=>t.dataset.c).filter(c=>c!=='normal');if(!P.conds.length){document.querySelector('[data-c="normal"]').classList.add('sel');P.conds=['normal']}};
window.submitProf=function(){P.age=+document.getElementById('iAge').value||0;P.ht=+document.getElementById('iHt').value||0;P.wt=+document.getElementById('iWt').value||0;if(!P.age||!P.ht||!P.wt){alert('연령, 키, 체중을 입력해주세요');return}assess();go('assessScreen')};

/* ═══ ASSESS ═══ */
function assess(){
P.bmi=+(P.wt/(P.ht/100)**2).toFixed(1);P.hrMax=220-P.age;
let rf=0;if(P.age>=(P.sex==='m'?45:55))rf++;if(P.bmi>=30)rf++;['hypertension','diabetes','obesity'].forEach(c=>{if(P.conds.includes(c))rf++});
P.risk=P.conds.some(c=>['heart','respiratory'].includes(c))?'high':rf>=2?'moderate':'low';
const z={low:[0.57,0.63],moderate:[0.50,0.57],high:[0.40,0.50]}[P.risk];P.hrZ=[Math.round(P.hrMax*z[0]),Math.round(P.hrMax*z[1])];
P.bmr=P.sex==='m'?Math.round(10*P.wt+6.25*P.ht-5*P.age+5):Math.round(10*P.wt+6.25*P.ht-5*P.age-161);P.tdee=Math.round(P.bmr*1.375);P.cal=P.bmi>=25?P.tdee-300:P.bmi<18.5?P.tdee+300:P.tdee;
let lv=P.age>=75?1:P.age>=65?2:P.age>=50?3:P.age>=35?4:5;
if(P.conds.some(c=>['arthritis','shoulderpain','sarcopenia','heart','respiratory'].includes(c)))lv=Math.max(1,lv-1);
if(P.bmi<18.5)lv=Math.max(1,lv-1);
const bs=[{n:'노란색',h:'#FBBF24',r:'가장 약함 1.5-2.5kg',d:'고령자/재활/초보'},{n:'빨간색',h:'#EF4444',r:'약함 3-4kg',d:'초보/경도 저하'},{n:'초록색',h:'#22C55E',r:'중간 5-7kg',d:'일반 성인'},{n:'파란색',h:'#3B82F6',r:'강함 8-12kg',d:'경험자'},{n:'검정색',h:'#1E293B',r:'가장 강함 13-18kg',d:'고급자'}];
const b=bs[lv-1];P.bandName=b.n;P.bandHex=b.h;P.bandR=b.r;P.bandD=b.d;
const il={low:'중강도 RPE 5-6',moderate:'저-중강도 RPE 4-5',high:'저강도 RPE 3-4'};
P.exRec=[`운동 강도: ${il[P.risk]}`,`목표 심박수: ${P.hrZ[0]}-${P.hrZ[1]} bpm`,`권장 빈도: 주 ${P.risk==='high'?3:'3-5'}회`];
['kneepain','shoulderpain','backpain','hypertension','osteoporosis'].forEach(c=>{if(P.conds.includes(c)){const m={kneepain:'무릎: 깊은 스쿼트 제한',shoulderpain:'어깨: 머리위 운동 제한',backpain:'허리: 전방 굴곡 제한',hypertension:'고혈압: 발살바 금지',osteoporosis:'골다공증: 고충격 제한'};P.exRec.push('⚠️ '+m[c])}});
P.dietRec=[`일일 칼로리: ${P.cal} kcal`,`단백질: ${Math.round(P.wt*(P.age>=65?1.2:0.8))}-${Math.round(P.wt*(P.age>=65?1.5:1.0))}g/일`,`수분: ${(P.wt*0.033).toFixed(1)}L/일`];
if(P.bmi>=25)P.dietRec.push('체중관리: 하루 300kcal 감소');if(P.conds.includes('diabetes'))P.dietRec.push('당뇨: 저GI 식품, 규칙적 식사');if(P.conds.includes('hypertension'))P.dietRec.push('고혈압: 나트륨 2g이하, DASH 식단');if(P.conds.includes('osteoporosis'))P.dietRec.push('골다공증: 칼슘 1200mg, 비타민D');if(P.conds.includes('sarcopenia'))P.dietRec.push('근감소증: 단백질 1.5g/kg');if(P.age>=65)P.dietRec.push('시니어: 비타민B12, 소량 빈번식사');

// Weekly plan
const freq=P.risk==='high'?3:P.risk==='moderate'?4:5;
P.weekPlan=[];const aer=P.conds.includes('kneepain')?'수중 걷기/고정식 자전거':'빠르게 걷기/가벼운 조깅';const res=P.useBand?'밴드 저항운동':'맨몸 근력운동';
const days=['월','화','수','목','금','토','일'];
for(let i=0;i<7;i++){if(i<freq){if(i%2===0)P.weekPlan.push({day:days[i],tp:'유산소+근력',dt:aer+' 20-30분 + '+res+' 20분'});else P.weekPlan.push({day:days[i],tp:'유산소+유연성',dt:aer+' 30분 + 스트레칭 15분'})}else if(i===freq)P.weekPlan.push({day:days[i],tp:'가벼운 활동',dt:'산책 20분 + 스트레칭 15분'});else P.weekPlan.push({day:days[i],tp:'휴식',dt:'완전 휴식 또는 가벼운 산책'})}

// Exercise prescription
P.exRx=[];
P.exRx.push({cat:'유산소 운동 (Aerobic)',freq:'주 '+(freq>=4?'3-5':'2-3')+'회',time:P.risk==='high'?'15-20분':'20-40분',int:P.risk==='high'?'저강도 (RPE 3-4)':P.risk==='moderate'?'저-중강도 (RPE 4-5)':'중강도 (RPE 5-6)',ex:P.conds.includes('kneepain')?'수중 걷기, 고정식 자전거, 상체 에르고미터':'빠르게 걷기, 자전거, 수영, 계단 오르기',nt:P.conds.includes('heart')?'운동 전후 5분 워밍업/쿨다운 필수':''});
P.exRx.push({cat:'근력 운동 (Resistance)',freq:'주 2-3회 (비연속일)',time:'20-30분',int:P.risk==='high'?'1RM 40-50%, 12-15회×1-2세트':P.risk==='moderate'?'1RM 50-60%, 10-12회×2세트':'1RM 60-70%, 8-12회×2-3세트',ex:P.useBand?'밴드 컬, 프레스, 로우, 레이즈, 스쿼트':'스쿼트, 런지, 벽 푸시업, 플랭크, 카프레이즈',nt:P.conds.includes('hypertension')?'발살바 금지. 내쉬며 수축':''});
P.exRx.push({cat:'유연성 운동 (Flexibility)',freq:'주 5-7회',time:'10-15분',int:'통증 없는 범위에서 당기는 느낌',ex:'목, 어깨, 햄스트링, 고관절, 종아리, 허리 스트레칭',nt:'각 동작 15-30초 유지, 2-4회 반복'});
if(P.age>=60)P.exRx.push({cat:'균형 운동 (Balance)',freq:'주 3회 이상',time:'10-15분',int:'벽/의자 근처에서 안전하게',ex:'한발 서기, 탄뎀 서기, 힐투토 걷기, 체중 이동',nt:'낙상 예방 핵심. 눈 감으면 난이도 상승'});

// Meal plan
const protG=Math.round(P.wt*(P.age>=65?1.3:0.9)),carbG=Math.round(P.cal*0.5/4),fatG=Math.round(P.cal*0.25/9);
P.macros={cal:P.cal,prot:protG,carb:carbG,fat:fatG};
P.meals=[];
P.meals.push({t:'아침 07:00',cal:Math.round(P.cal*0.3),mn:P.conds.includes('diabetes')?'현미밥 2/3공기 + 된장국 + 계란찜 + 시금치나물':'잡곡밥 1공기 + 미역국 + 계란프라이 + 김치 + 우유',tp:'아침 단백질로 근합성 촉진'});
P.meals.push({t:'간식 10:00',cal:Math.round(P.cal*0.1),mn:P.age>=65?'고구마 1/2개 + 두유':'그릭요거트 + 견과류 + 바나나 1/2',tp:'운동 1시간 전 에너지 공급'});
P.meals.push({t:'점심 12:00',cal:Math.round(P.cal*0.35),mn:P.conds.includes('hypertension')?'현미밥 + 닭가슴살 샐러드 + 두부조림 (저염)':'잡곡밥 + 생선구이 + 콩나물국 + 브로콜리',tp:'단백질+채소 충분히'});
P.meals.push({t:'간식 15:00',cal:Math.round(P.cal*0.08),mn:P.conds.includes('sarcopenia')?'삶은 계란 2개 + 우유 (류신 풍부)':'사과 1개 + 치즈 1장',tp:'운동 후 30분 이내 단백질 섭취'});
P.meals.push({t:'저녁 18:00',cal:Math.round(P.cal*0.25),mn:P.bmi>=25?'현미밥 1/2 + 두부스테이크 + 버섯볶음 + 샐러드':'잡곡밥 2/3 + 소고기 야채볶음 + 미소국 + 나물',tp:P.bmi>=25?'저녁 탄수화물 줄이기':'취침 3시간 전 마무리'});
if(P.age>=65)P.meals.push({t:'야식 21:00',cal:Math.round(P.cal*0.05),mn:'따뜻한 우유 1잔 또는 바나나 1/2',tp:'카제인 단백질로 야간 근분해 방지'});
P.supps=[];
if(P.age>=65)P.supps.push({nm:'비타민D',ds:'800-1000 IU/일',rs:'골밀도, 근력, 면역'});
if(P.conds.includes('osteoporosis'))P.supps.push({nm:'칼슘',ds:'1000-1200 mg/일',rs:'골밀도 유지'});
if(P.age>=65)P.supps.push({nm:'비타민B12',ds:'500-1000 mcg/일',rs:'노화 흡수 감소 보충'});
if(P.conds.includes('sarcopenia'))P.supps.push({nm:'유청단백질',ds:'20-25g 운동 후',rs:'류신 풍부, 근합성 촉진'});
if(P.conds.includes('arthritis'))P.supps.push({nm:'오메가-3',ds:'1-2g EPA+DHA/일',rs:'항염증, 관절 건강'});

{id:'press',kr:'숄더 프레스',en:'Shoulder Press',desc:'밴드를 어깨에서 머리 위로 밀기',icon:'🏋️',reps:10,color:'#F59E0B',cat:'upper',band:true,avoid:['shoulderpain'],

window.renderProg=function(){document.getElementById('pgCont').innerHTML=`<div class="card"><div class="section-title">⏱️ 운동 시간</div><div class="dgrid">${[5,10,15,20,30].map(d=>`<button class="dbtn ${d===P.dur?'sel':''}" onclick="pDur(${d},this)">${d}분<small>${d<=5?'간단히':d<=10?'기본':d<=20?'표준':'풀코스'}</small></button>`).join('')}</div></div><div class="card"><div class="section-title">🎗️ 운동 유형</div><div class="tgrid"><button class="tbtn ${P.useBand?'sel':''}" onclick="pType(1,this)"><div class="ti">🎗️</div><div class="tn">밴드 사용</div><div class="td">추천: ${P.bandName}</div></button><button class="tbtn ${!P.useBand?'sel':''}" onclick="pType(0,this)"><div class="ti">🤸</div><div class="tn">맨몸</div><div class="td">도구 없이</div></button></div></div><button class="btn btn-primary" onclick="buildProg()">다음: 미리보기 →</button><div style="height:24px"></div>`};
window.pDur=function(d,el){P.dur=d;document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel')};
window.pType=function(b,el){P.useBand=!!b;document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel')};

window.buildProg=function(){
const up=P.useBand?EX.upper_band:EX.upper_no;
const uf=up.filter(e=>!e.avoid.some(a=>P.conds.includes(a)));
let lo=EX.lower.filter(e=>!e.avoid.some(a=>P.conds.includes(a)));
if(P.conds.includes('kneepain')){lo=lo.filter(e=>e.id!=='squat')}
const tc=Math.max(2,Math.round(P.dur/2));
const pg=[...EX.warmup];
const us=Math.ceil((tc-1)*0.6),ls=tc-1-us;
for(let i=0;i<us&&i<uf.length;i++)pg.push(uf[i]);
for(let i=0;i<ls&&i<lo.length;i++)pg.push(lo[i]);
if(P.risk==='high')pg.forEach(e=>{e.reps=Math.max(6,e.reps-3)});
P.prog=pg;renderInstr();go('instrScreen');
};

function renderInstr(){const cl={warmup:'🔥 워밍업',upper:'💪 상체',lower:'🦵 하체'};
let h=`<div class="card" style="text-align:center;padding:16px"><div style="font-size:13px;color:#64748b">총 ${P.prog.length}종 · 약 ${P.dur}분</div><div style="font-size:14px;font-weight:700;margin-top:4px;color:var(--acc)">${P.useBand?'밴드: '+P.bandName:'맨몸 운동'}</div></div>`;
P.prog.forEach((ex,i)=>{h+=`<div class="ep" onclick="document.getElementById('d${i}').style.display=document.getElementById('d${i}').style.display==='none'?'block':'none'"><div class="ei">${ex.icon}</div><div style="flex:1"><div style="font-size:14px;font-weight:700">${ex.kr} <span style="font-size:11px;color:#64748b">${ex.en}</span></div><div style="font-size:11px;color:#94a3b8;margin-top:2px">${ex.desc}</div><div style="font-size:11px;color:var(--acc);margin-top:2px">${cl[ex.cat]} · ${ex.reps}회${ex.band?' · 밴드':''}</div></div></div><div id="d${i}" class="card" style="display:none;margin-top:-8px"><div style="font-size:13px;font-weight:700;color:var(--acc);margin-bottom:8px">📋 수행 방법</div>${ex.instr.map((s,j)=>`<div class="istep"><div class="istep-n">${j+1}</div><div style="font-size:13px;color:#cbd5e1;line-height:1.5">${s}</div></div>`).join('')}${ex.caution?`<div class="icaut">⚠️ ${ex.caution}</div>`:''}</div>`});
h+=`<button class="btn btn-primary" onclick="startWk()">🎈 운동 시작!</button><div style="height:24px"></div>`;
document.getElementById('inCont').innerHTML=h}

function getBP(lm,t,w,h){switch(t){case'shoulder':return{x:((lm[11].x+lm[12].x)/2)*w,y:((lm[11].y+lm[12].y)/2)*h-55};case'aboveHead':return{x:((lm[11].x+lm[12].x)/2)*w,y:Math.max(35,Math.min(lm[11].y,lm[12].y)*h-85)};case'hands':return{x:((lm[15].x+lm[16].x)/2)*w,y:Math.max(35,((lm[15].y+lm[16].y)/2)*h-35)};case'hip':return{x:((lm[23].x+lm[24].x)/2)*w,y:((lm[23].y+lm[24].y)/2)*h};default:return{x:w/2,y:h*0.3}}}
function mkBall(){balloons=[];const ex=P.exList[P.exI];if(!ex)return;const cv=document.getElementById('pc');const sz=58+Math.random()*16;balloons.push({x:(cv.width||640)/2,y:(cv.height||480)*(ex.bTarget==='hip'?0.6:0.25),c:ex.color,s:sz,_origS:sz,bp:Math.random()*6.28,bs:2+Math.random()*2,alive:true,sc:0})}
function popBalls(){sndPop();balloons.forEach(b=>{if(!b.alive)return;b.alive=false;for(let i=0;i<40;i++){const a=(6.28/40)*i,sp=3+Math.random()*10;particles.push({x:b.x,y:b.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-4,s:3+Math.random()*8,c:b.c,l:1,d:0.015+Math.random()*0.02,g:0.15,ic:0})}for(let i=0;i<20;i++)particles.push({x:b.x+(Math.random()-0.5)*60,y:b.y+(Math.random()-0.5)*60,vx:(Math.random()-0.5)*8,vy:-Math.random()*10-3,s:5+Math.random()*6,c:['#FFD700','#FF6B9D','#06D6A0','#38BDF8','#A78BFA','#FF3366'][~~(Math.random()*6)],l:1,d:0.01+Math.random()*0.015,g:0.12,ic:1,r:Math.random()*360,rs:(Math.random()-0.5)*20})})}
function li(h,a){let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`}
function dk(h,a){let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`}
function drB(ctx,b,t){if(!b.alive)return;b.sc=Math.min(1,b.sc+0.06);const by=Math.sin(t*b.bs+b.bp)*6,x=b.x,y=b.y+by,s=b.s*b.sc;ctx.save();ctx.translate(x,y);ctx.beginPath();ctx.moveTo(0,s*0.7);ctx.quadraticCurveTo(4,s*0.7+20,-2,s*0.7+40);ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.5;ctx.stroke();ctx.beginPath();ctx.ellipse(0,0,s*0.6,s*0.78,0,0,Math.PI*2);const gr=ctx.createRadialGradient(-s*0.1,-s*0.15,s*0.08,0,0,s*0.78);gr.addColorStop(0,li(b.c,60));gr.addColorStop(0.5,b.c);gr.addColorStop(1,dk(b.c,30));ctx.fillStyle=gr;ctx.fill();ctx.beginPath();ctx.ellipse(-s*0.15,-s*0.28,s*0.14,s*0.22,-0.4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.32)';ctx.fill();ctx.restore()}
function drP(ctx){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.l-=p.d;if(p.l<=0){particles.splice(i,1);continue}ctx.save();ctx.globalAlpha=p.l;ctx.translate(p.x,p.y);if(p.ic){p.r+=p.rs;ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/4,p.s,p.s/2)}else{ctx.beginPath();ctx.arc(0,0,p.s*p.l,0,Math.PI*2);ctx.fillStyle=p.c;ctx.fill()}ctx.restore()}}

function upProg(){const t=P.exList.reduce((s,e)=>s+e.reps,0);let d=0;for(let i=0;i<P.exI;i++)d+=P.exList[i].reps;d+=P.rep;document.getElementById('cpf').style.width=(d/t*100)+'%';document.getElementById('cp').textContent=`${P.exI+1}/${P.exList.length}`}

/* ═══ REP DETECTION — 4-STATE MACHINE ═══ */
/* WAIT → REST → MOVE → POP → (cooldown) → REST → MOVE → POP → ... 
   WAIT: 운동 시작 직후, 반드시 REST 자세를 먼저 확인
   REST: 원위치 확인됨, 동작 시작 가능
   MOVE: 동작 구간 진입, 홀드 카운트 중
   POP:  터짐! 쿨다운 후 다시 REST 대기 */
let repState='WAIT',holdCt=0;
const HOLD_FRAMES=5;  // 8프레임 연속 유지 필요
const REST_FRAMES=3;  // 원위치도 5프레임 확인
let restCt=0;
let repCD_timer=null;

function checkRep(lm){
  if(!P.on)return;
  const ex=P.exList[P.exI];if(!ex||!ex.detect)return;
  const r=ex.detect(lm);if(!r)return;
  const si=document.getElementById('csi'),st=document.getElementById('cstxt');

  switch(repState){
    case 'WAIT':
      // 운동 시작 직후: 반드시 REST 자세를 먼저 취해야 함
      si.textContent='🔵';
      if(r.rst){
        restCt++;
        st.textContent=`자세 확인 ${restCt}/${REST_FRAMES}`;
        if(restCt>=REST_FRAMES){
          restCt=0;repState='REST';mkBall();
          si.textContent='🎈';st.textContent='동작하세요!';
        }
      }else{
        restCt=Math.max(0,restCt-1);
        st.textContent='원위치로 서세요';
      }
      break;

    case 'REST':
      // 원위치 확인됨, 동작 시작 감지
      si.textContent='🎈';st.textContent='동작하세요!';
      if(r.hit){
        holdCt++;
        if(holdCt>=2){repState='MOVE';holdCt=2;} // 2프레임 진입하면 MOVE로
      }else{holdCt=0}
      break;

    case 'MOVE':
      // 동작 중, 홀드 카운팅
      if(r.hit){
        holdCt++;
        const pct=Math.min(100,Math.round(holdCt/HOLD_FRAMES*100));
        si.textContent='💥';
        st.textContent=`유지! ${pct}%`;
        // 풍선 흔들림 효과
        balloons.forEach(b=>{if(b.alive)b.s=b._origS*(1+pct/500)});
        if(holdCt>=HOLD_FRAMES){
          repState='POP';holdCt=0;trigPop();
        }
      }else{
        holdCt=Math.max(0,holdCt-2); // 빠지면 빠르게 감소
        if(holdCt<=0){repState='REST'} // 완전히 빠지면 REST로
        si.textContent='🎈';st.textContent='더 올리세요!';
      }
      break;

    case 'POP':
      // 터짐! 쿨다운 중 (trigPop에서 타이머로 REST 전환)
      si.textContent='✅';st.textContent='잘했어요!';
      break;
  }
}

function trigPop(){
  popBalls();P.rep++;P.pops++;
  const rn=document.getElementById('crn');rn.textContent=P.rep;rn.style.transform='scale(1.5)';rn.style.color='#FF3366';setTimeout(()=>{rn.style.transform='scale(1)';rn.style.color='#fff'},400);
  upDots(P.exList[P.exI].reps,P.rep);upProg();
  const m=P.exList[P.exI].reps;let msg;
  if(P.rep===m)msg='🎉 완벽!';else if(P.rep===m-1)msg='🎯 마지막!';else if(P.rep===Math.ceil(m/2))msg='🏆 절반!';
  else msg=['펑! 💥','팡! 🎈','터졌다! 💣','좋아요! 👏','파워! 💪','대단해! 🔥','최고! ⭐','짱! 🏅'][~~(Math.random()*8)];
  showFB(msg);
  if(P.rep>=m){
    P.on=false; // 즉시 감지 중단
    setTimeout(()=>nextEx(),3000);
  }else{
    // 2.5초 쿨다운 후 REST로 전환 (이 동안 아무것도 안 잡힘)
    P.on=false;
    setTimeout(()=>{
      repState='WAIT';restCt=0;holdCt=0;P.on=true;
    },1200);
  }
}

function nextEx(){P.exI++;if(P.exI>=P.exList.length){finish();return}showTr()}
function showTr(){P.on=false;const s=document.getElementById('trScr'),ex=P.exList[P.exI];document.getElementById('trs').textContent=`${P.exI+1}/${P.exList.length}`;document.getElementById('tri').textContent=ex.icon;document.getElementById('trn').textContent=ex.kr;document.getElementById('trd').textContent=ex.desc;document.getElementById('trr').textContent=`${ex.reps}회`;s.classList.add('on');let c=5;document.getElementById('trc').textContent=c;sndTick();const iv=setInterval(()=>{c--;if(c<=0){clearInterval(iv);s.classList.remove('on');beginEx()}else{document.getElementById('trc').textContent=c;if(c<=3)sndTick()}},1000)}

function beginEx(){
  const ex=P.exList[P.exI];P.rep=0;P.phase='down';holdCt=0;balloons=[];particles=[];
  document.getElementById('cn').textContent=`${ex.icon} ${ex.kr}`;document.getElementById('cd').textContent=ex.desc;
  document.getElementById('crn').textContent='0';document.getElementById('crm').textContent=ex.reps;
  upDots(ex.reps,0);upProg();
  document.getElementById('cst').style.display='block';document.getElementById('csi').textContent='⏳';document.getElementById('cstxt').textContent='준비...';
  // Calibration for calf raise
  P._calBase=0.5;
  showFB('준비! 🏁');
  P.on=false;repState='WAIT';holdCt=0;restCt=0;
  setTimeout(()=>{
    if(latestLM){P._calBase=(latestLM[11].y+latestLM[12].y)/2}
    P.on=true;
    showFB('원위치! 🧍');
    document.getElementById('csi').textContent='🔵';
    document.getElementById('cstxt').textContent='원위치로 서세요';
  },3000);
}

function finish(){P.on=false;if(tmr)clearInterval(tmr);sndWin();const el=Math.floor((Date.now()-P.t0)/1000),mm=Math.floor(el/60),ss=el%60;if(anim)cancelAnimationFrame(anim);anim=null;const v=document.getElementById('vid');if(v.srcObject){v.srcObject.getTracks().forEach(t=>t.stop());v.srcObject=null}document.getElementById('camScreen').classList.remove('active');document.getElementById('compScreen').classList.add('active');document.getElementById('csub').textContent=`${P.prog.length}종 운동 ${mm}분 ${ss}초 완료!`;document.getElementById('cstats').innerHTML=`<div class="sc"><div class="sn">${P.pops}</div><div class="sl">🎈 풍선</div></div><div class="sc"><div class="sn">${P.exList.length}</div><div class="sl">✅ 운동</div></div><div class="sc"><div class="sn">${mm}:${String(ss).padStart(2,'0')}</div><div class="sl">⏱ 시간</div></div>`}
window.exitEx=function(){P.on=false;if(anim)cancelAnimationFrame(anim);anim=null;if(tmr)clearInterval(tmr);const v=document.getElementById('vid');if(v.srcObject){v.srcObject.getTracks().forEach(t=>t.stop());v.srcObject=null}document.getElementById('camScreen').classList.remove('active');go('instrScreen')};

let latestLM=null;
function loop(){const v=document.getElementById('vid'),pc=document.getElementById('pc'),ctx=pc.getContext('2d'),fc=document.getElementById('fc'),fctx=fc.getContext('2d');
if(v.readyState>=2&&v.currentTime!==lvt&&pose){lvt=v.currentTime;const res=pose.detectForVideo(v,performance.now());ctx.clearRect(0,0,pc.width,pc.height);
if(res.landmarks&&res.landmarks.length>0){latestLM=res.landmarks[0];const du=new DrawingUtils(ctx);du.drawConnectors(latestLM,PoseLandmarker.POSE_CONNECTIONS,{color:'rgba(255,255,255,0.2)',lineWidth:2});du.drawLandmarks(latestLM,{color:'rgba(6,214,160,0.6)',radius:3});
if(P.on&&P.exI<P.exList.length){checkRep(latestLM);const ex=P.exList[P.exI];const pos=getBP(latestLM,ex.bTarget,pc.width,pc.height);balloons.forEach(b=>{if(b.alive){b.x+=(pos.x-b.x)*0.12;b.y+=(pos.y-b.y)*0.12}})}}}
fctx.clearRect(0,0,fc.width,fc.height);const t=performance.now()/1000;fctx.save();fctx.translate(fc.width,0);fctx.scale(-1,1);balloons.forEach(b=>drB(fctx,b,t));drP(fctx);fctx.restore();anim=requestAnimationFrame(loop)}
